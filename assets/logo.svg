<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">ctrl+brain logo</title>
  <desc id="d">A dark keycap holding a clean brain silhouette, labelled ctrl plus.</desc>

  <!-- keycap: darker base + lighter top face leaves a front lip at the bottom -->
  <rect x="64" y="64" width="384" height="384" rx="100" fill="#20232B"/>
  <rect x="86" y="72" width="340" height="330" rx="78" fill="#2C313C"/>
  <rect x="86.75" y="72.75" width="338.5" height="328.5" rx="77" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- brain silhouette -->
  <path d="M200 256 C184 256 174 240 184 228 C166 222 166 198 186 194
           C182 174 206 164 220 178 C226 160 250 160 256 176
           C262 160 286 160 292 178 C306 164 330 174 326 194
           C346 198 346 222 328 228 C338 240 328 256 312 256
           C314 272 288 280 276 268 C266 280 246 280 236 268
           C224 280 198 272 200 256 Z" fill="#EFEDE6"/>

  <!-- minimal folds (key-colour, cut into the brain) -->
  <g fill="none" stroke="#2C313C" stroke-width="9" stroke-linecap="round">
    <path d="M256 180 C248 202 262 218 252 238"/>
    <path d="M216 202 C208 210 210 224 222 226"/>
    <path d="M296 202 C304 210 302 224 290 226"/>
  </g>

  <!-- keycap legend -->
  <text x="256" y="336" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="30" letter-spacing="3" fill="#888FA1">ctrl <tspan fill="#E6A93C">+</tspan></text>
</svg>
