<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">ctrl+brain logo</title>
  <desc id="d">A dark keycap holding a clean, symmetric brain silhouette, labelled ctrl plus.</desc>

  <!-- keycap: darker base + lighter top face leaves a front lip at the bottom -->
  <rect x="64" y="64" width="384" height="384" rx="100" fill="#20232B"/>
  <rect x="86" y="72" width="340" height="330" rx="78" fill="#2C313C"/>
  <rect x="86.75" y="72.75" width="338.5" height="328.5" rx="77" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- symmetric brain: one clean half, mirrored about the centre -->
  <defs>
    <g id="bh">
      <path d="M256 178 C268 166 288 164 296 178 C310 168 330 174 330 192
               C346 196 350 216 336 228 C348 238 346 258 330 260
               C336 276 316 286 302 276 C292 286 268 284 256 276 Z" fill="#EFEDE6"/>
      <g fill="none" stroke="#2C313C" stroke-width="8" stroke-linecap="round">
        <path d="M298 198 C290 216 302 228 294 244"/>
        <path d="M322 210 C330 218 326 230 314 232"/>
      </g>
    </g>
  </defs>
  <use href="#bh"/>
  <use href="#bh" transform="translate(512,0) scale(-1,1)"/>
  <path d="M256 180 C251 212 261 244 256 274" fill="none" stroke="#2C313C" stroke-width="8" stroke-linecap="round"/>

  <!-- keycap legend -->
  <text x="256" y="338" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="30" letter-spacing="3" fill="#888FA1">ctrl <tspan fill="#E6A93C">+</tspan></text>
</svg>
